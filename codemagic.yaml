workflows:
  android-preview:
    name: ORIZON Android Preview APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - orizon_env # contient EXPO_PUBLIC_SUPABASE_URL, EXPO_PUBLIC_SUPABASE_ANON_KEY, etc.
      node: 20.11.1
      java: 17
    cache:
      cache_paths:
        - ~/.gradle/caches
        - $CM_BUILD_DIR/react-native-app/node_modules
    scripts:
      - name: Install dependencies
        script: |
          cd react-native-app
          corepack enable
          yarn install --immutable || yarn install
      - name: Write .env from Codemagic env vars
        script: |
          cd react-native-app
          cat > .env <<EOF
          EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY
          EXPO_PUBLIC_POSTHOG_KEY=$EXPO_PUBLIC_POSTHOG_KEY
          EXPO_PUBLIC_POSTHOG_HOST=$EXPO_PUBLIC_POSTHOG_HOST
          EXPO_PUBLIC_COMPANY_NAME=$EXPO_PUBLIC_COMPANY_NAME
          EXPO_PUBLIC_COMPANY_ADDRESS=$EXPO_PUBLIC_COMPANY_ADDRESS
          EXPO_PUBLIC_COMPANY_WEBSITE=$EXPO_PUBLIC_COMPANY_WEBSITE
          EXPO_PUBLIC_SUPPORT_EMAIL=$EXPO_PUBLIC_SUPPORT_EMAIL
          EXPO_PUBLIC_SUPPORT_PHONE=$EXPO_PUBLIC_SUPPORT_PHONE
          EXPO_PUBLIC_SUPPORT_WHATSAPP=$EXPO_PUBLIC_SUPPORT_WHATSAPP
          EOF
      - name: Expo prebuild (Android)
        script: |
          cd react-native-app
          npx expo prebuild --platform android --no-install --clean
      - name: Build Android APK (release unsigned)
        script: |
          cd react-native-app/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
    artifacts:
      - react-native-app/android/app/build/outputs/**/*.apk
      - react-native-app/android/app/build/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - $EXPO_PUBLIC_SUPPORT_EMAIL
        notify:
          success: true
          failure: true

  ios-preview:
    name: ORIZON iOS Preview (unsigned simulator)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - orizon_env
      node: 20.11.1
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $CM_BUILD_DIR/react-native-app/node_modules
        - $CM_BUILD_DIR/react-native-app/ios/Pods
    scripts:
      - name: Install dependencies
        script: |
          cd react-native-app
          corepack enable
          yarn install --immutable || yarn install
      - name: Write .env from Codemagic env vars
        script: |
          cd react-native-app
          cat > .env <<EOF
          EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY
          EXPO_PUBLIC_POSTHOG_KEY=$EXPO_PUBLIC_POSTHOG_KEY
          EXPO_PUBLIC_POSTHOG_HOST=$EXPO_PUBLIC_POSTHOG_HOST
          EXPO_PUBLIC_COMPANY_NAME=$EXPO_PUBLIC_COMPANY_NAME
          EXPO_PUBLIC_COMPANY_ADDRESS=$EXPO_PUBLIC_COMPANY_ADDRESS
          EXPO_PUBLIC_COMPANY_WEBSITE=$EXPO_PUBLIC_COMPANY_WEBSITE
          EXPO_PUBLIC_SUPPORT_EMAIL=$EXPO_PUBLIC_SUPPORT_EMAIL
          EXPO_PUBLIC_SUPPORT_PHONE=$EXPO_PUBLIC_SUPPORT_PHONE
          EXPO_PUBLIC_SUPPORT_WHATSAPP=$EXPO_PUBLIC_SUPPORT_WHATSAPP
          EOF
      - name: Expo prebuild (iOS)
        script: |
          cd react-native-app
          npx expo prebuild --platform ios --no-install --clean
      - name: Pod install
        script: |
          cd react-native-app/ios
          pod install
      - name: Build iOS (Simulator, no signing)
        script: |
          cd react-native-app/ios
          SCHEME=$(ls *.xcworkspace | head -1 | sed 's/.xcworkspace//')
          xcodebuild \
            -workspace "$SCHEME.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO | xcpretty
    artifacts:
      - react-native-app/ios/build/Build/Products/**/*.app
    publishing:
      email:
        recipients:
          - $EXPO_PUBLIC_SUPPORT_EMAIL
        notify:
          success: true
          failure: true
