workflows:
  android-debug:
    name: ORIZON Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - orizon_env
      node: 20.11.1
      java: 17
    cache:
      cache_paths:
        - ~/.gradle/caches
        - $CM_BUILD_DIR/react-native-app/node_modules
    scripts:
      - name: Install dependencies
        script: |
          cd react-native-app
          corepack enable
          corepack prepare yarn@4.14.1 --activate
          yarn config set nodeLinker node-modules
          yarn install --no-immutable
      - name: Write .env from Codemagic env vars
        script: |
          cd react-native-app
          cat > .env <<EOF
          EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY
          EXPO_PUBLIC_POSTHOG_KEY=$EXPO_PUBLIC_POSTHOG_KEY
          EXPO_PUBLIC_POSTHOG_HOST=$EXPO_PUBLIC_POSTHOG_HOST
          EXPO_PUBLIC_COMPANY_NAME=$EXPO_PUBLIC_COMPANY_NAME
          EXPO_PUBLIC_COMPANY_ADDRESS=$EXPO_PUBLIC_COMPANY_ADDRESS
          EXPO_PUBLIC_COMPANY_WEBSITE=$EXPO_PUBLIC_COMPANY_WEBSITE
          EXPO_PUBLIC_SUPPORT_EMAIL=$EXPO_PUBLIC_SUPPORT_EMAIL
          EXPO_PUBLIC_SUPPORT_PHONE=$EXPO_PUBLIC_SUPPORT_PHONE
          EXPO_PUBLIC_SUPPORT_WHATSAPP=$EXPO_PUBLIC_SUPPORT_WHATSAPP
          EOF
      - name: Expo prebuild (Android)
        script: |
          cd react-native-app
          npx expo prebuild --platform android --no-install --clean
      - name: Build Android Debug APK
        script: |
          cd react-native-app/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - react-native-app/android/app/build/outputs/**/*.apk

  android-release:
    name: ORIZON Android Release APK (light)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - orizon_env
      node: 20.11.1
      java: 17
    cache:
      cache_paths:
        - ~/.gradle/caches
        - $CM_BUILD_DIR/react-native-app/node_modules
    scripts:
      - name: Install dependencies
        script: |
          cd react-native-app
          corepack enable
          corepack prepare yarn@4.14.1 --activate
          yarn config set nodeLinker node-modules
          yarn install --no-immutable
      - name: Write .env from Codemagic env vars
        script: |
          cd react-native-app
          cat > .env <<EOF
          EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY
          EXPO_PUBLIC_POSTHOG_KEY=$EXPO_PUBLIC_POSTHOG_KEY
          EXPO_PUBLIC_POSTHOG_HOST=$EXPO_PUBLIC_POSTHOG_HOST
          EXPO_PUBLIC_COMPANY_NAME=$EXPO_PUBLIC_COMPANY_NAME
          EXPO_PUBLIC_COMPANY_ADDRESS=$EXPO_PUBLIC_COMPANY_ADDRESS
          EXPO_PUBLIC_COMPANY_WEBSITE=$EXPO_PUBLIC_COMPANY_WEBSITE
          EXPO_PUBLIC_SUPPORT_EMAIL=$EXPO_PUBLIC_SUPPORT_EMAIL
          EXPO_PUBLIC_SUPPORT_PHONE=$EXPO_PUBLIC_SUPPORT_PHONE
          EXPO_PUBLIC_SUPPORT_WHATSAPP=$EXPO_PUBLIC_SUPPORT_WHATSAPP
          EOF
      - name: Expo prebuild (Android)
        script: |
          cd react-native-app
          npx expo prebuild --platform android --no-install --clean
      - name: Generate reusable debug keystore (for release signing)
        script: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/orizon-release.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/orizon-release.keystore \
              -alias orizon \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass orizon123 -keypass orizon123 \
              -dname "CN=Orizon, OU=Mobile, O=Orizon, L=Port-au-Prince, S=Ouest, C=HT"
          fi
      - name: Enable R8, resource shrinking & ProGuard
        script: |
          cd react-native-app/android
          # Forcer minify + shrinkResources sur le buildType release
          node -e "
          const fs = require('fs');
          const p = 'app/build.gradle';
          let s = fs.readFileSync(p, 'utf8');
          s = s.replace(/minifyEnabled\s+(true|false)/g, 'minifyEnabled true');
          s = s.replace(/shrinkResources\s+(true|false)/g, 'shrinkResources true');
          if (!s.includes('shrinkResources')) {
            s = s.replace(/(release\s*\{)/, '\$1\n            shrinkResources true');
          }
          fs.writeFileSync(p, s);
          console.log('Patched app/build.gradle');
          "
          # Configurer la signature release avec notre keystore
          cat >> app/build.gradle <<'EOF'

android {
    signingConfigs {
        release {
            storeFile file(System.getenv("HOME") + "/.android/orizon-release.keystore")
            storePassword "orizon123"
            keyAlias "orizon"
            keyPassword "orizon123"
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}
EOF
      - name: Build Android Release APK
        script: |
          cd react-native-app/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Show APK size
        script: |
          ls -lh react-native-app/android/app/build/outputs/apk/release/
    artifacts:
      - react-native-app/android/app/build/outputs/apk/release/*.apk
