  android-test:
    name: ORIZON Android TEST APK (release light, debug-signed, install-friendly)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - orizon_env
      node: 20.11.1
      java: 17
    cache:
      cache_paths:
        - ~/.gradle/caches
        - $CM_BUILD_DIR/react-native-app/node_modules
    scripts:
      - name: Install dependencies
        script: |
          cd react-native-app
          corepack enable
          corepack prepare yarn@4.14.1 --activate
          yarn config set nodeLinker node-modules
          yarn install --no-immutable
      - name: Write .env from Codemagic env vars
        script: |
          cd react-native-app
          cat > .env <<EOF
          EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY
          EXPO_PUBLIC_POSTHOG_KEY=$EXPO_PUBLIC_POSTHOG_KEY
          EXPO_PUBLIC_POSTHOG_HOST=$EXPO_PUBLIC_POSTHOG_HOST
          EXPO_PUBLIC_COMPANY_NAME=$EXPO_PUBLIC_COMPANY_NAME
          EXPO_PUBLIC_COMPANY_ADDRESS=$EXPO_PUBLIC_COMPANY_ADDRESS
          EXPO_PUBLIC_COMPANY_WEBSITE=$EXPO_PUBLIC_COMPANY_WEBSITE
          EXPO_PUBLIC_SUPPORT_EMAIL=$EXPO_PUBLIC_SUPPORT_EMAIL
          EXPO_PUBLIC_SUPPORT_PHONE=$EXPO_PUBLIC_SUPPORT_PHONE
          EXPO_PUBLIC_SUPPORT_WHATSAPP=$EXPO_PUBLIC_SUPPORT_WHATSAPP
          EOF
      - name: Expo prebuild (Android)
        script: |
          cd react-native-app
          npx expo prebuild --platform android --no-install --clean
      - name: Generate debug keystore (signature v1+v2+v3 compatible toutes versions Android)
        script: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
      - name: Bundle JS manuellement (garantit index.android.bundle dans assets/)
        script: |
          cd react-native-app
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res
          # CRUCIAL: exporter les EXPO_PUBLIC_* dans le shell AVANT le bundle
          # sinon process.env.EXPO_PUBLIC_* = undefined dans le bundle final
          export EXPO_PUBLIC_SUPABASE_URL="$EXPO_PUBLIC_SUPABASE_URL"
          export EXPO_PUBLIC_SUPABASE_ANON_KEY="$EXPO_PUBLIC_SUPABASE_ANON_KEY"
          export EXPO_PUBLIC_POSTHOG_KEY="$EXPO_PUBLIC_POSTHOG_KEY"
          export EXPO_PUBLIC_POSTHOG_HOST="$EXPO_PUBLIC_POSTHOG_HOST"
          export EXPO_PUBLIC_COMPANY_NAME="$EXPO_PUBLIC_COMPANY_NAME"
          export EXPO_PUBLIC_COMPANY_ADDRESS="$EXPO_PUBLIC_COMPANY_ADDRESS"
          export EXPO_PUBLIC_COMPANY_WEBSITE="$EXPO_PUBLIC_COMPANY_WEBSITE"
          export EXPO_PUBLIC_SUPPORT_EMAIL="$EXPO_PUBLIC_SUPPORT_EMAIL"
          export EXPO_PUBLIC_SUPPORT_PHONE="$EXPO_PUBLIC_SUPPORT_PHONE"
          export EXPO_PUBLIC_SUPPORT_WHATSAPP="$EXPO_PUBLIC_SUPPORT_WHATSAPP"
          echo "DEBUG SUPABASE_URL = $EXPO_PUBLIC_SUPABASE_URL"
          echo "DEBUG SUPABASE_ANON_KEY length = ${#EXPO_PUBLIC_SUPABASE_ANON_KEY}"
          # Expo SDK 54 : utiliser expo export:embed (pas react-native bundle)
          npx expo export:embed \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache
          echo "=== Verif bundle ==="
          ls -lh android/app/src/main/assets/index.android.bundle
          # Verifier que l'URL Supabase est bien embarquee dans le bundle
          echo "=== Verif URL Supabase dans le bundle ==="
          if grep -c "supabase.co" android/app/src/main/assets/index.android.bundle > /dev/null 2>&1; then
            echo "OK: URL supabase.co trouvee dans le bundle"
          else
            echo "ATTENTION: URL supabase.co INTROUVABLE dans le bundle - les env vars n'ont pas ete inlinees !"
          fi
      - name: Reecrire build.gradle avec config debug-signed simple
        script: |
          cd react-native-app/android
          # On supprime toute logique de signing complexe et on cree un release qui
          # utilise simplement le debug keystore, SANS toucher au reste du gradle d'Expo.
          # Le bundle JS est deja dans assets/, donc Expo n'a meme plus besoin de bundler.
          cat > app/signing.gradle <<'GRADLE_EOF'
          android {
              signingConfigs {
                  releaseDebug {
                      storeFile file(System.getenv("HOME") + "/.android/debug.keystore")
                      storePassword "android"
                      keyAlias "androiddebugkey"
                      keyPassword "android"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.releaseDebug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          GRADLE_EOF
          # Inclure le fichier dans build.gradle si pas deja present
          if ! grep -q "apply from: 'signing.gradle'" app/build.gradle; then
            echo "" >> app/build.gradle
            echo "apply from: 'signing.gradle'" >> app/build.gradle
          fi
          echo "=== Tail de build.gradle ==="
          tail -20 app/build.gradle
      - name: Build Android Release APK
        script: |
          cd react-native-app/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Verifier APK final
        script: |
          cd react-native-app/android/app/build/outputs/apk/release
          ls -lh
          for apk in *.apk; do
            echo "=== Contenu de $apk ==="
            unzip -l "$apk" | grep -E "index.android.bundle" || echo "BUNDLE MANQUANT !"
            echo "=== Signature ==="
            $ANDROID_SDK_ROOT/build-tools/*/apksigner verify --verbose "$apk" 2>&1 | head -10 || true
          done
    artifacts:
      - react-native-app/android/app/build/outputs/apk/release/*.apk

  android-release:
    name: ORIZON Android Release APK (light)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - orizon_env
      node: 20.11.1
      java: 17
    cache:
      cache_paths:
        - ~/.gradle/caches
        - $CM_BUILD_DIR/react-native-app/node_modules
    scripts:
      - name: Install dependencies
        script: |
          cd react-native-app
          corepack enable
          corepack prepare yarn@4.14.1 --activate
          yarn config set nodeLinker node-modules
          yarn install --no-immutable
      - name: Write .env from Codemagic env vars
        script: |
          cd react-native-app
          cat > .env <<EOF
          EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY
          EXPO_PUBLIC_POSTHOG_KEY=$EXPO_PUBLIC_POSTHOG_KEY
          EXPO_PUBLIC_POSTHOG_HOST=$EXPO_PUBLIC_POSTHOG_HOST
          EXPO_PUBLIC_COMPANY_NAME=$EXPO_PUBLIC_COMPANY_NAME
          EXPO_PUBLIC_COMPANY_ADDRESS=$EXPO_PUBLIC_COMPANY_ADDRESS
          EXPO_PUBLIC_COMPANY_WEBSITE=$EXPO_PUBLIC_COMPANY_WEBSITE
          EXPO_PUBLIC_SUPPORT_EMAIL=$EXPO_PUBLIC_SUPPORT_EMAIL
          EXPO_PUBLIC_SUPPORT_PHONE=$EXPO_PUBLIC_SUPPORT_PHONE
          EXPO_PUBLIC_SUPPORT_WHATSAPP=$EXPO_PUBLIC_SUPPORT_WHATSAPP
          EOF
      - name: Expo prebuild (Android)
        script: |
          cd react-native-app
          npx expo prebuild --platform android --no-install --clean
      - name: Generate reusable debug keystore (for release signing)
        script: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/orizon-release.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/orizon-release.keystore \
              -alias orizon \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass orizon123 -keypass orizon123 \
              -dname "CN=Orizon, OU=Mobile, O=Orizon, L=Port-au-Prince, S=Ouest, C=HT"
          fi
      - name: Enable R8, resource shrinking & ProGuard
        script: |
          cd react-native-app/android
          sed -i.bak -E 's/minifyEnabled (true|false)/minifyEnabled true/g' app/build.gradle
          sed -i.bak -E 's/shrinkResources (true|false)/shrinkResources true/g' app/build.gradle
          if ! grep -q "shrinkResources true" app/build.gradle; then
            sed -i.bak -E '/release \{/a\
            shrinkResources true' app/build.gradle
          fi
          rm -f app/build.gradle.bak
          cat >> app/build.gradle <<'GRADLE_EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file(System.getenv("HOME") + "/.android/orizon-release.keystore")
                      storePassword "orizon123"
                      keyAlias "orizon"
                      keyPassword "orizon123"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
              splits {
                  abi {
                      enable true
                      reset()
                      include "armeabi-v7a", "arm64-v8a", "x86_64"
                      universalApk true
                  }
              }
          }
          GRADLE_EOF
      - name: Build Android Release APK
        script: |
          cd react-native-app/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Show APK size
        script: |
          ls -lh react-native-app/android/app/build/outputs/apk/release/
    artifacts:
      - react-native-app/android/app/build/outputs/apk/release/*.apk

  android-aab:
    name: ORIZON Android Release AAB (Play Store)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - orizon_env
        - orizon_keystore
      node: 20.11.1
      java: 17
    cache:
      cache_paths:
        - ~/.gradle/caches
        - $CM_BUILD_DIR/react-native-app/node_modules
    scripts:
      - name: Install dependencies
        script: |
          cd react-native-app
          corepack enable
          corepack prepare yarn@4.14.1 --activate
          yarn config set nodeLinker node-modules
          yarn install --no-immutable
      - name: Write .env from Codemagic env vars
        script: |
          cd react-native-app
          cat > .env <<EOF
          EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY
          EXPO_PUBLIC_POSTHOG_KEY=$EXPO_PUBLIC_POSTHOG_KEY
          EXPO_PUBLIC_POSTHOG_HOST=$EXPO_PUBLIC_POSTHOG_HOST
          EXPO_PUBLIC_COMPANY_NAME=$EXPO_PUBLIC_COMPANY_NAME
          EXPO_PUBLIC_COMPANY_ADDRESS=$EXPO_PUBLIC_COMPANY_ADDRESS
          EXPO_PUBLIC_COMPANY_WEBSITE=$EXPO_PUBLIC_COMPANY_WEBSITE
          EXPO_PUBLIC_SUPPORT_EMAIL=$EXPO_PUBLIC_SUPPORT_EMAIL
          EXPO_PUBLIC_SUPPORT_PHONE=$EXPO_PUBLIC_SUPPORT_PHONE
          EXPO_PUBLIC_SUPPORT_WHATSAPP=$EXPO_PUBLIC_SUPPORT_WHATSAPP
          EOF
      - name: Decode upload keystore (PROD)
        script: |
          mkdir -p ~/.android
          # Le keystore PROD doit etre stocke en variable Codemagic ORIZON_UPLOAD_KEYSTORE_B64 (base64).
          if [ -n "$ORIZON_UPLOAD_KEYSTORE_B64" ]; then
            echo "$ORIZON_UPLOAD_KEYSTORE_B64" | base64 -d > ~/.android/orizon-upload.keystore
          else
            echo "ATTENTION: aucune var ORIZON_UPLOAD_KEYSTORE_B64. Generation d'un keystore TEST (a NE PAS publier)."
            keytool -genkeypair -v \
              -keystore ~/.android/orizon-upload.keystore \
              -alias orizon-upload \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "${ORIZON_KEYSTORE_PASS:-orizon123}" -keypass "${ORIZON_KEY_PASS:-orizon123}" \
              -dname "CN=Orizon, OU=Mobile, O=Orizon, L=Port-au-Prince, S=Ouest, C=HT"
          fi
      - name: Expo prebuild (Android)
        script: |
          cd react-native-app
          npx expo prebuild --platform android --no-install --clean
      - name: Inject release signing
        script: |
          cd react-native-app/android
          cat >> app/build.gradle <<'GRADLE_EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file(System.getenv("HOME") + "/.android/orizon-upload.keystore")
                      storePassword System.getenv("ORIZON_KEYSTORE_PASS") ?: "orizon123"
                      keyAlias System.getenv("ORIZON_KEY_ALIAS") ?: "orizon-upload"
                      keyPassword System.getenv("ORIZON_KEY_PASS") ?: "orizon123"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      shrinkResources true
                  }
              }
          }
          GRADLE_EOF
      - name: Build Android AAB
        script: |
          cd react-native-app/android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon
      - name: Show AAB size
        script: |
          ls -lh react-native-app/android/app/build/outputs/bundle/release/
    artifacts:
      - react-native-app/android/app/build/outputs/bundle/release/*.aab

  ios-release:
    name: ORIZON iOS Release (App Store)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      groups:
        - orizon_env
        - orizon_ios
      node: 20.11.1
      xcode: latest
      cocoapods: default
      ios_signing:
        # Configurer dans Codemagic > Teams > Code signing identities :
        #   - Distribution certificate (.p12) lie a ton Apple Developer account
        #   - Provisioning profile App Store pour com.orizon.mobile
        distribution_type: app_store
        bundle_identifier: com.orizon.mobile
    cache:
      cache_paths:
        - $CM_BUILD_DIR/react-native-app/node_modules
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Install dependencies
        script: |
          cd react-native-app
          corepack enable
          corepack prepare yarn@4.14.1 --activate
          yarn config set nodeLinker node-modules
          yarn install --no-immutable
      - name: Write .env from Codemagic env vars
        script: |
          cd react-native-app
          cat > .env <<EOF
          EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY
          EXPO_PUBLIC_POSTHOG_KEY=$EXPO_PUBLIC_POSTHOG_KEY
          EXPO_PUBLIC_POSTHOG_HOST=$EXPO_PUBLIC_POSTHOG_HOST
          EXPO_PUBLIC_COMPANY_NAME=$EXPO_PUBLIC_COMPANY_NAME
          EXPO_PUBLIC_COMPANY_ADDRESS=$EXPO_PUBLIC_COMPANY_ADDRESS
          EXPO_PUBLIC_COMPANY_WEBSITE=$EXPO_PUBLIC_COMPANY_WEBSITE
          EXPO_PUBLIC_SUPPORT_EMAIL=$EXPO_PUBLIC_SUPPORT_EMAIL
          EXPO_PUBLIC_SUPPORT_PHONE=$EXPO_PUBLIC_SUPPORT_PHONE
          EXPO_PUBLIC_SUPPORT_WHATSAPP=$EXPO_PUBLIC_SUPPORT_WHATSAPP
          EOF
      - name: Expo prebuild (iOS)
        script: |
          cd react-native-app
          npx expo prebuild --platform ios --no-install --clean
      - name: Pod install
        script: |
          cd react-native-app/ios
          pod install
      - name: Set build number
        script: |
          cd react-native-app/ios
          agvtool new-version -all $(($PROJECT_BUILD_NUMBER + $BUILD_NUMBER)) || true
      - name: Build iOS .ipa (App Store)
        script: |
          cd react-native-app/ios
          xcodebuild \
            -workspace OrizonMobile.xcworkspace \
            -scheme OrizonMobile \
            -configuration Release \
            -archivePath build/OrizonMobile.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            archive
          xcodebuild -exportArchive \
            -archivePath build/OrizonMobile.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist $CM_BUILD_DIR/react-native-app/ios/ExportOptions.plist \
            -allowProvisioningUpdates
    artifacts:
      - react-native-app/ios/build/ipa/*.ipa
      - react-native-app/ios/build/OrizonMobile.xcarchive
    publishing:
      app_store_connect:
        # Configurer Codemagic > Teams > Integrations > App Store Connect (API key)
        # puis ajouter les 3 variables suivantes dans le group `orizon_ios` :
        #   APP_STORE_CONNECT_PRIVATE_KEY (contenu du .p8)
        #   APP_STORE_CONNECT_KEY_IDENTIFIER (Key ID)
        #   APP_STORE_CONNECT_ISSUER_ID (Issuer ID)
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  android-production-aab:
    name: ORIZON Android PRODUCTION (AAB signe pour Google Play)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      groups:
        - orizon_env
        - orizon_keystore   # Doit contenir : CM_KEYSTORE (base64), CM_KEYSTORE_PASSWORD, CM_KEY_ALIAS, CM_KEY_PASSWORD
      android_signing:
        - orizon_upload_keystore  # Codemagic UI > Code signing identities > Android keystore
      node: 20.11.1
      java: 17
    cache:
      cache_paths:
        - ~/.gradle/caches
        - $CM_BUILD_DIR/react-native-app/node_modules
    scripts:
      - name: Install dependencies
        script: |
          cd react-native-app
          corepack enable
          corepack prepare yarn@4.14.1 --activate
          yarn config set nodeLinker node-modules
          yarn install --no-immutable
      - name: Write .env from Codemagic env vars
        script: |
          cd react-native-app
          cat > .env <<EOF
          EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY
          EXPO_PUBLIC_POSTHOG_KEY=$EXPO_PUBLIC_POSTHOG_KEY
          EXPO_PUBLIC_POSTHOG_HOST=$EXPO_PUBLIC_POSTHOG_HOST
          EXPO_PUBLIC_COMPANY_NAME=$EXPO_PUBLIC_COMPANY_NAME
          EXPO_PUBLIC_COMPANY_ADDRESS=$EXPO_PUBLIC_COMPANY_ADDRESS
          EXPO_PUBLIC_COMPANY_WEBSITE=$EXPO_PUBLIC_COMPANY_WEBSITE
          EXPO_PUBLIC_SUPPORT_EMAIL=$EXPO_PUBLIC_SUPPORT_EMAIL
          EXPO_PUBLIC_SUPPORT_PHONE=$EXPO_PUBLIC_SUPPORT_PHONE
          EXPO_PUBLIC_SUPPORT_WHATSAPP=$EXPO_PUBLIC_SUPPORT_WHATSAPP
          EOF
      - name: Expo prebuild (Android)
        script: |
          cd react-native-app
          npx expo prebuild --platform android --no-install --clean
      - name: Configure release signing
        script: |
          cd react-native-app/android
          # Codemagic injects keystore automatically via android_signing block above.
          # On verifie juste que app/build.gradle a bien le signingConfig release.
          if ! grep -q "signingConfigs" app/build.gradle; then
            echo "WARNING: signingConfigs absent. Configurez le keystore upload dans Codemagic UI."
          fi
      - name: Bundle JS pour release
        script: |
          cd react-native-app
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res
          npx expo export:embed \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache
      - name: Build AAB release
        script: |
          cd react-native-app/android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace
      - name: Rename AAB
        script: |
          cd react-native-app/android/app/build/outputs/bundle/release
          ls -lh
          cp app-release.aab orizon-production.aab || true
    artifacts:
      - react-native-app/android/app/build/outputs/bundle/release/*.aab
      - react-native-app/android/app/build/outputs/mapping/release/mapping.txt
    publishing:
      google_play:
        # Configurer Codemagic > Teams > Integrations > Google Play
        # puis ajouter GCLOUD_SERVICE_ACCOUNT_CREDENTIALS dans le group orizon_keystore
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal   # internal | alpha | beta | production
        submit_as_draft: true
        in_app_update_priority: 3

  ios-eas-build:
    # Workflow alternatif a `ios-release` : delegue entierement le build + signature
    # a EAS Build (cloud Expo). Pas besoin de certificats / provisioning profiles
    # uploades dans Codemagic. Plus simple pour une premiere soumission.
    # Pre-requis : EXPO_TOKEN + APPLE_ID + ASC_APP_ID (App Store Connect) en env vars.
    name: ORIZON iOS via EAS Build (cloud)
    max_build_duration: 60
    instance_type: linux_x2   # Pas besoin de Mac : EAS Build fournit la VM macOS
    environment:
      groups:
        - orizon_env
        - orizon_eas   # Doit contenir : EXPO_TOKEN (token non-revoque)
      node: 20.11.1
    scripts:
      - name: Install dependencies
        script: |
          cd react-native-app
          corepack enable
          corepack prepare yarn@4.14.1 --activate
          yarn config set nodeLinker node-modules
          yarn install --no-immutable
      - name: Write .env
        script: |
          cd react-native-app
          cat > .env <<EOF
          EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY
          EXPO_PUBLIC_POSTHOG_KEY=$EXPO_PUBLIC_POSTHOG_KEY
          EXPO_PUBLIC_POSTHOG_HOST=$EXPO_PUBLIC_POSTHOG_HOST
          EXPO_PUBLIC_COMPANY_NAME=$EXPO_PUBLIC_COMPANY_NAME
          EXPO_PUBLIC_COMPANY_ADDRESS=$EXPO_PUBLIC_COMPANY_ADDRESS
          EXPO_PUBLIC_COMPANY_WEBSITE=$EXPO_PUBLIC_COMPANY_WEBSITE
          EXPO_PUBLIC_SUPPORT_EMAIL=$EXPO_PUBLIC_SUPPORT_EMAIL
          EXPO_PUBLIC_SUPPORT_PHONE=$EXPO_PUBLIC_SUPPORT_PHONE
          EXPO_PUBLIC_SUPPORT_WHATSAPP=$EXPO_PUBLIC_SUPPORT_WHATSAPP
          EOF
      - name: Trigger EAS Build (production iOS)
        script: |
          cd react-native-app
          export EXPO_TOKEN="$EXPO_TOKEN"
          # --non-interactive + --no-wait : on lance le build sur EAS Cloud
          # et on ne bloque pas Codemagic (le build prend 20-30 min cote EAS).
          # Le binaire .ipa sera disponible sur https://expo.dev/accounts/fiedly71/projects/orizon-mobile/builds
          npx eas build --platform ios --profile production --non-interactive --no-wait
      - name: Trigger EAS Submit (TestFlight upload automatique)
        script: |
          cd react-native-app
          export EXPO_TOKEN="$EXPO_TOKEN"
          # Attend le build precedent puis upload sur App Store Connect / TestFlight
          # Configuration TestFlight via eas.json -> submit -> ios
          npx eas submit --platform ios --profile production --non-interactive --latest || true
    artifacts: []


